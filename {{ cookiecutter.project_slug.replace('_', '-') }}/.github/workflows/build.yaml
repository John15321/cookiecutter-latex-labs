name: Build Document

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Build document and gather artifacts (containerised, Docker)
        run: |
          # GitHub-hosted runners ship Docker (running) but not a ready-to-use
          # rootless Podman socket, so force the Docker engine here. Locally,
          # `make build` still auto-detects Podman first.
          make ci-build ENGINE=docker
          make artifacts ENGINE=docker

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: document-pdf-${{ github.run_number }}
          path: artifacts/*.pdf
          retention-days: 30

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.pdf
          name: "Document ${{ github.ref_name }}"
          body: |
            ## Document Release ${{ github.ref_name }}

            📅 **Generated**: ${{ github.event.head_commit.timestamp }}
            🔗 **Commit**: [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
